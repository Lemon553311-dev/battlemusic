name: Build & Release

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      publish_test:
        description: >-
          Also run the Modrinth and CurseForge publish steps on every target,
          in dry-run mode (MODRINTH_DRY_RUN / CURSEFORGE_DRY_RUN = true -
          validates the tokens/projects/config and
          prints what would be uploaded, without actually uploading anything).
          Use this to verify publishing works before cutting a real
          v* tag release.
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # One job per Stonecutter target, running in parallel instead of one job
  # building all 28 sequentially. Public repo on GitHub-hosted runners has no
  # per-minute cost, only a concurrency cap (~20 jobs at once on the free
  # tier), so this trades a single ~30 min job for a batch of few-minute jobs.
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
          - 1.16.5-fabric
          - 1.17.1-fabric
          - 1.18.2-fabric
          - 1.19.2-fabric
          - 1.19.4-fabric
          - 1.20.1-fabric
          - 1.20.4-fabric
          - 1.20.6-fabric
          - 1.21.1-fabric
          - 1.21.4-fabric
          - 1.21.5-fabric
          - 1.21.8-fabric
          - 26.1.2-fabric
          - 26.2-fabric
          - 1.16.5-forge
          - 1.17.1-forge
          - 1.18.2-forge
          - 1.19.2-forge
          - 1.19.4-forge
          - 1.20.1-forge
          - 1.20.4-neoforge
          - 1.20.6-neoforge
          - 1.21.1-neoforge
          - 1.21.4-neoforge
          - 1.21.5-neoforge
          - 1.21.8-neoforge
          - 26.1.2-neoforge
          - 26.2-neoforge
    runs-on: ubuntu-latest
    steps:
      # v6+ runs on Node 24 natively, avoiding the "Node.js 20 is deprecated"
      # warning GitHub now prints on every job (all 28 matrix jobs otherwise).
      - uses: actions/checkout@v6

      # The Stonecutter nodes target Java 17 / 21 / 25 as a toolchain base;
      # older per-tier JDKs (8, 16) are auto-downloaded by the foojay resolver.
      - name: Set up JDKs
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21
            25
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Builds and collects the jar(s) for ONLY this matrix target, instead of
      # buildAndCollect (no target) which would build every registered version
      # in this one job.
      - name: Build ${{ matrix.target }}
        # On a v* tag, MOD_VERSION drives the mod version (e.g. v1.3.0 -> 1.3.0).
        # It MUST be gated to tags: github.ref_name on a branch push is the
        # BRANCH NAME, which once shipped jars versioned "forgeimpl". When the
        # gate leaves it empty, the build scripts fall back to mod.version in
        # stonecutter.properties.toml.
        run: ./gradlew ":${{ matrix.target }}:buildAndCollect" --configure-on-demand --no-daemon --stacktrace
        env:
          MOD_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}

      - name: Collect jars
        run: |
          mkdir -p release
          find build/libs -name '*.jar' -exec cp {} release/ \;
          rm -f release/*-sources.jar release/*-dev.jar release/*-dev-shadow.jar
          ls -la release

      # One artifact per target (upload-artifact@v4 requires unique names
      # across a run, unlike v3 which merged same-named uploads).
      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: battlemusic-jars-${{ matrix.target }}
          path: release/*.jar
          if-no-files-found: error

      # Published per-target, right after that target's own build, instead of
      # from a separate job - the Gradle project is already configured and
      # built here, so this avoids a second full rebuild just to publish.
      # Runs on a real v* tag (real upload) OR a manual publish_test dispatch
      # (dry run only - see MODRINTH_DRY_RUN below and the workflow_dispatch
      # input description above).
      - name: Publish ${{ matrix.target }} to Modrinth
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_test)
        run: ./gradlew ":${{ matrix.target }}:modrinth" --configure-on-demand --no-daemon --stacktrace
        env:
          MOD_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_test && 'true' || '' }}

      # Mirror of the Modrinth step above: same v*-tag / publish_test dry-run
      # gating. Needs the CURSEFORGE_TOKEN repo secret (an API token from
      # https://authors.curseforge.com/account/api-tokens) and the numeric
      # mod.curseforge_id in stonecutter.properties.toml.
      - name: Publish ${{ matrix.target }} to CurseForge
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_test)
        run: ./gradlew ":${{ matrix.target }}:publishCurseforge" --configure-on-demand --no-daemon --stacktrace
        env:
          MOD_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_test && 'true' || '' }}

  # Runs once, after every matrix job finishes, purely to assemble the GitHub
  # Release from jars that are already built - no rebuilding here. Only on a
  # real tag push (a manual publish_test dispatch never creates a release).
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all built jars
        uses: actions/download-artifact@v7
        with:
          pattern: battlemusic-jars-*
          path: release
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          generate_release_notes: true
