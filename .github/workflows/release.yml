name: Build & Release

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Stonecutter nodes target Java 17 / 21 / 25, so install all three.
      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
            25

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # buildAndCollect runs across every version subproject and copies the jars
      # into build/libs/<mod version>/.
      - name: Build all versions
        # On a v* tag, MOD_VERSION drives the mod version (e.g. v1.3.0 -> 1.3.0).
        # On tagless pushes it is empty, so build.gradle.kts falls back to the
        # mod.version in stonecutter.properties.toml.
        run: ./gradlew buildAndCollect --no-daemon --stacktrace
        env:
          MOD_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}

      - name: Collect jars
        run: |
          mkdir -p release
          find build/libs -name '*.jar' -exec cp {} release/ \;
          rm -f release/*-sources.jar release/*-dev.jar release/*-dev-shadow.jar
          ls -la release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: battlemusic-jars
          path: release/*.jar
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          generate_release_notes: true
