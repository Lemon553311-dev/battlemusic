name: Build & Release

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Stonecutter nodes target Java 17 / 21 / 25, so install all three.
      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
            25

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # buildAndCollect builds every version in settings.gradle.kts at
      # once and copies the jars into build/libs/<mod version>/. The mod version
      # comes from mod.version in stonecutter.properties.toml.
      - name: Build all versions
        run: ./gradlew buildAndCollect --no-daemon --stacktrace

      - name: Collect jars
        run: |
          mkdir -p release
          find build/libs -name '*.jar' -exec cp {} release/ \;
          rm -f release/*-sources.jar release/*-dev.jar release/*-dev-shadow.jar
          ls -la release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: battlemusic-jars
          path: release/*.jar
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          generate_release_notes: true
