# Centralized Stonecutter properties.
# Shared keys live at the top; per-version overrides live in the ["<version>"]
# sections (these are read in build.gradle.kts via sc.properties[...]).
# See https://stonecutter.kikugie.dev/wiki/config/properties
#
# Version ladder (1.16 -> 26.2), grouped by the //? if gates that actually
# change behavior in the Java sources (see PORTING.md for the full writeup):
#   - HUD registration: HudRenderCallback (<1.21.6) vs HudElementRegistry (>=1.21.6)
#   - HUD draw target:  PoseStack (<1.20) vs GuiGraphics (1.20-1.21.x) vs GuiGraphicsExtractor (>=26.1)
#   - Blit call:        legacy scaled blit (<1.21.5) vs RenderPipelines blit (>=1.21.5)
#   - Registries:       Registry.ENTITY_TYPE (<1.19.3) vs BuiltInRegistries.ENTITY_TYPE (>=1.19.3)
#   - Warden:           does not exist before 1.19
#   - Non-obf renames:  ResourceLocation/GuiGraphics (<26.1) vs Identifier/GuiGraphicsExtractor (>=26.1)
#
# Dependency versions have been verified against the live Modrinth API (see
# PORTING.md for the verification log). mod.loader_compat minimums are loose
# lower bounds and were not independently re-verified, but any recent Fabric
# Loader satisfies them.

mod.id = "battlemusic"
mod.name = "Battle Music"
mod.group = "me.lemon553311.battlemusic"
mod.version = "1.2.0"
# Modrinth project to publish to (the slug from your project URL, or its ID).
mod.modrinth_id = "battle-music"
# CurseForge project to publish to. This must be the NUMERIC project id shown
# in the "About Project" box on the CurseForge project page (NOT the slug).
# TODO: replace with your real id after creating the project on CurseForge.
mod.curseforge_id = "000000"

# Fabric API version range for fabric.mod.json's depends block. Kept at "*"
# (any version) so older modpacks running older Fabric API builds are not
# locked out - every Fabric API release for 1.17+ already contains all the
# modules this mod uses (lifecycle events v1, networking api v1, rendering
# v1). Only 1.16.5 needs a real floor; it overrides this in its own section.
mod.fabric_api_compat = "*"

# Fabric API's mod id is version-dependent and is NOT checked by the compiler,
# so it must be pinned per tier or the mod refuses to launch even when Fabric
# API is installed:
#   - pre-1.19.3   : id is "fabric" ("fabric-api" does not exist yet)
#   - 1.19.3-1.21.x: renamed to "fabric-api" ("fabric" kept as an alias)
#   - 26.1+        : the "fabric" alias was REMOVED; only "fabric-api" works
# "fabric-api" is therefore correct for every tier >=1.19.3 (shared default
# below); the four pre-1.19.3 tiers override it back to "fabric" in their own
# sections. Consumed by processResources expand() as ${fabric_api_id} in
# fabric.mod.json's depends block.
mod.fabric_api_id = "fabric-api"

# Fabric Loader itself is not Minecraft-version-specific, so one buildtime
# loader works to compile every tier below.
deps.fabric_loader = "0.19.3"

# ---- 1.16.x: pre-GuiGraphics, pre-BuiltInRegistries, pre-Warden-registry-move, Java 8 ----
["1.16.5-fabric"]
mod.mc_compat = ">=1.16 <=1.16.5"
mod.loader_compat = ">=0.11.3"       # verify - earliest loader that reliably supports 1.16.5
mod.mc_releases = "1.16,1.16.1,1.16.2,1.16.3,1.16.4,1.16.5"
mod.java_compat = ">=8"
deps.fabric_api = "0.42.0+1.16"
mod.fabric_api_id = "fabric"         # pre-1.19.3: Fabric API's mod id is "fabric", not "fabric-api"
# Runtime floor: ClientPlayConnectionEvents (networking api v1) first shipped
# in Fabric API 0.30.0 for 1.16.5 (Jan 2021, verified on Modrinth/CurseForge).
# Older API builds are missing the class and would crash this mod on init, so
# they must be rejected up front with a clear "update Fabric API" screen.
mod.fabric_api_compat = ">=0.30.0"
deps.modmenu = "1.16.23"
deps.cloth_config = "4.16.91"        # confirmed on Modrinth

